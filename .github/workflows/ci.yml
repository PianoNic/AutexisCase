name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/AutexisCase.API/AutexisCase.API.csproj && dotnet restore src/AutexisCase.Tests/AutexisCase.Tests.csproj

      - name: Build
        run: dotnet build src/AutexisCase.API/AutexisCase.API.csproj -c Release --no-restore

      - name: Test
        run: dotnet test src/AutexisCase.Tests/AutexisCase.Tests.csproj -c Release --no-restore --logger "console;verbosity=minimal"
