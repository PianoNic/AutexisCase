name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (overrides version_type if set, e.g. 1.2.3)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          # Read version from the API csproj, default to 0.1.0
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/AutexisCase.API/AutexisCase.API.csproj 2>/dev/null || echo "0.1.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Calculate new version
        id: new
        run: |
          if [ -n "${{ inputs.custom_version }}" ]; then
            NEW_VERSION="${{ inputs.custom_version }}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
            case "${{ inputs.version_type }}" in
              major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version in csproj files
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          for csproj in src/AutexisCase.API/AutexisCase.API.csproj; do
            if grep -q '<Version>' "$csproj"; then
              sed -i "s|<Version>[^<]*</Version>|<Version>${NEW_VERSION}</Version>|" "$csproj"
            else
              sed -i "s|</PropertyGroup>|  <Version>${NEW_VERSION}</Version>\n  </PropertyGroup>|" "$csproj"
            fi
          done

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.new.outputs.version }}"
          git tag "v${{ steps.new.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.new.outputs.version }}"
          generate_release_notes: true
