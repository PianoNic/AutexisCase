services:
  postgres:
    image: postgres:18
    container_name: autexiscase-postgres
    environment:
      POSTGRES_USER: autexiscase
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: autexiscasedb-dev
    volumes:
      - autexiscase-pgdata:/var/lib/postgresql
    ports:
      - "5433:5432"
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: autexiscase-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8180"
    command: start-dev --import-realm
    volumes:
      - ./config/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./config/keycloak/themes/autexiscase:/opt/keycloak/themes/autexiscase:ro
    ports:
      - "8180:8180"
    restart: unless-stopped

volumes:
  autexiscase-pgdata:
