services:
  postgres:
    image: postgres:18
    container_name: autexiscase-postgres
    environment:
      POSTGRES_USER: autexiscase
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: autexiscasedb-dev
    volumes:
      - autexiscase-pgdata:/var/lib/postgresql
    ports:
      - "5433:5432"
    restart: unless-stopped

  epcis-db:
    image: postgres:18
    container_name: autexiscase-epcis-db
    environment:
      POSTGRES_USER: epcis
      POSTGRES_PASSWORD: epcis
      POSTGRES_DB: epcis
    volumes:
      - epcis-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  epcis:
    image: ghcr.io/openepcis/epcis-repository-quarkus:latest
    container_name: autexiscase-epcis
    ports:
      - "8099:8080"
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: epcis
      QUARKUS_DATASOURCE_PASSWORD: epcis
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://epcis-db:5432/epcis
    depends_on:
      - epcis-db
    restart: unless-stopped

volumes:
  autexiscase-pgdata:
  epcis-pgdata:
