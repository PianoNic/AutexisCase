services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autexis
      POSTGRES_PASSWORD: autexis
      POSTGRES_DB: autexis
    volumes:
      - pgdata:/var/lib/postgresql/data

  epcis-db:
    image: postgres:15
    environment:
      POSTGRES_USER: epcis
      POSTGRES_PASSWORD: epcis
      POSTGRES_DB: epcis
    volumes:
      - epcis_pgdata:/var/lib/postgresql/data

  epcis:
    image: ghcr.io/openepcis/epcis-repository-quarkus:latest
    ports:
      - "8099:8080"
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: epcis
      QUARKUS_DATASOURCE_PASSWORD: epcis
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://epcis-db:5432/epcis
    depends_on:
      - epcis-db

volumes:
  pgdata:
  epcis_pgdata:
