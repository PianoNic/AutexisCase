services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autexiscase-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

      - ConnectionStrings__DefaultConnection=Host=postgres;Database=autexiscase;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}



      - Oidc__Authority=${OIDC_AUTHORITY}
      - Oidc__RequireHttpsMetadata=${OIDC_REQUIRE_HTTPS:-true}

    restart: unless-stopped

    depends_on:
      - postgres

  postgres:
    image: postgres:18
    container_name: autexiscase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: autexiscase
    volumes:
      - autexiscase-pgdata:/var/lib/postgresql/data
    restart: unless-stopped


volumes:

  autexiscase-pgdata:


